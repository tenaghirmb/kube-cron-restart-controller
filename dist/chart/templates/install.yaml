apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cronrestarters.autorestart.uni.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  labels:
  {{- include "chart.labels" . | nindent 4 }}
spec:
  group: autorestart.uni.com
  names:
    kind: CronRestarter
    listKind: CronRestarterList
    plural: cronrestarters
    singular: cronrestarter
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The cron schedule for restarting the target resource
      jsonPath: .spec.schedule
      name: Schedule
      type: string
    - description: The timezone for the cron schedule
      jsonPath: .spec.timezone
      name: TIMEZONE
      priority: 1
      type: string
    - description: The dates to exclude from the cron schedule
      jsonPath: .spec.excludeDates
      name: EXCLUDE-DATES
      priority: 1
      type: string
    - description: The target resource to be restarted
      jsonPath: .spec.restartTargetRef
      name: TARGET
      priority: 1
      type: string
    - description: The last time the cron job was executed
      jsonPath: .status.lastExecutionTime
      name: LAST-EXEC
      type: string
    - description: The current state of the cron job
      jsonPath: .status.state
      name: STATE
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              excludeDates:
                items:
                  type: string
                type: array
              misfireDeadWindowMinutes:
                description: |-
                  MisfireDeadWindowMinutes specifies the threshold in minutes.
                  If the next regular execution time is closer than this window, the misfire recovery will be ignored.
                  Default to 5 minutes if not specified.
                format: int32
                minimum: 1
                type: integer
              misfirePolicy:
                default: Ignore
                description: |-
                  MisfirePolicy defines the behavior when a scheduled execution is missed.
                  It can be set to "Ignore" (default) to skip missed executions, or "FireAndProceed" to execute the missed job immediately.
                enum:
                - Ignore
                - FireAndProceed
                type: string
              restartTargetRef:
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              schedule:
                description: |-
                  Schedule is a cron expression that defines the schedule for restarting the target resource.
                  It supports standard cron expressions as well as predefined schedules like "annually", "yearly", "monthly", "weekly", "daily", "midnight", "hourly", and "every".
                pattern: ^((@hourly|@daily|@weekly|@monthly|@annually|@yearly|@midnight)|(@every\s+[0-9]+[smh])|((([0-59\*a-zA-Z0-9,\-\/]+)\s+){4}([0-7\*a-zA-Z0-9,\-\/]+)))$
                type: string
              timezone:
                description: If schedule contains '@', the timezone will be ignored.
                  Otherwise, the timezone will be used to determine the schedule.
                type: string
            required:
            - restartTargetRef
            - schedule
            type: object
          status:
            properties:
              conditions:
                items:
                  properties:
                    lastProbeTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    state:
                      type: string
                  required:
                  - lastProbeTime
                  - message
                  - state
                  type: object
                type: array
              entryId:
                description: EntryID identifies an entry within a Cron instance
                type: integer
              lastExecutionTime:
                format: date-time
                type: string
              lastTickTimestamp:
                format: date-time
                type: string
              message:
                type: string
              processingTick:
                format: date-time
                type: string
              state:
                type: string
            required:
            - entryId
            - message
            - state
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []
---
{{ if .Values.serviceAccount.create }}
