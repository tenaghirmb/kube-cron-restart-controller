# Staticcheck configuration file
# Official documentation: https://staticcheck.io/docs/configuration/options/

# Enable all default checks
checks = ["all", "-ST1000", "-ST1003"]

# Explanation：
# "all": Enable all built-in checks
# "-ST1000": Disable "package comments must start with Package" check (sometimes annoying)
# "-ST1003": Disable "does not conform to Go naming convention" check (useful if your CRD field must match an external specification)

# Set the Go version to make sure the checker doesn't complain about the modern syntax you're using
dot_import_whitelist = []
http_status_code_whitelist = ["200", "400", "404", "500"]
