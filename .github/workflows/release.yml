name: Release App and Helm Chart

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Allow workflow to commit code to the repository and create branches (for pushing gh-pages)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Get complete history for subsequent processing

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod' # Automatically match the Go version based on the go.mod of the kubebuilder project

      - name: Get Version from Tag
        id: get_version
        run: |
          # Extract tag name (e.g., extract 1.0.0 from refs/tags/v1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      # ==========================================
      # 1. Build and push Docker images
      # ==========================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile # The Dockerfile generated by Kubebuilder in the root directory by default
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cronrestart:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cronrestart:v${{ steps.get_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==========================================
      # 2. Automatically package and publish Helm Chart
      # ==========================================
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v4.2.3'

      - name: Update Helm Chart Metadata and Image Tag
        run: |
          CHART_DIR="dist/chart" 
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          # 1. Modify the version number and application version number in Chart.yaml
          tr -d '\r' < ${CHART_DIR}/Chart.yaml > ${CHART_DIR}/Chart.yaml.tmp && mv ${CHART_DIR}/Chart.yaml.tmp ${CHART_DIR}/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/g" ${CHART_DIR}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/g" ${CHART_DIR}/Chart.yaml
          
          # 2. Modify the image warehouse and tag in values.yaml
          # Please adjust the sed command here according to your actual values.yaml structure
          sed -i "s|repository:.*|repository: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cronrestart|g" ${CHART_DIR}/values.yaml
          sed -i "s|tag:.*|tag: v${VERSION}|g" ${CHART_DIR}/values.yaml

      - name: Package Helm Chart
        run: |
          CHART_DIR="dist/chart"
          # Create a temporary directory to store the packaged files
          mkdir -p .cr-release-packages
          helm package ${CHART_DIR} -d .cr-release-packages

      # ==========================================
      # 配置 Git 机器人身份（解决 Author identity unknown 报错）
      # ==========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Helm Chart to GitHub Pages
        uses: helm/chart-releaser-action@v1.7.0
        with:
          config: .github/cr.yaml # Configuration file of chart-releaser
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
