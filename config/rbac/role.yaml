---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autorestart.uni.com
  resources:
  - cronrestarters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autorestart.uni.com
  resources:
  - cronrestarters/finalizers
  verbs:
  - update
- apiGroups:
  - autorestart.uni.com
  resources:
  - cronrestarters/status
  verbs:
  - get
  - patch
  - update
